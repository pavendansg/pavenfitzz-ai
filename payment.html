<!-- payment.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PavenFitzz Payment</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.box{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:22px;
border:1px solid #222;
text-align:center;
box-shadow:0 0 25px rgba(255,215,0,0.15);
}
h1{
color:#ffd700;
margin-bottom:12px;
}
.price{
font-size:30px;
color:#00ff99;
margin-bottom:15px;
font-weight:bold;
}
.qr{
background:#1a1a1a;
padding:30px;
border-radius:18px;
margin:20px 0;
border:1px dashed #444;
}
.qr p{
color:#aaa;
}
.upi{
background:#1a1a1a;
padding:14px;
border-radius:14px;
margin-bottom:18px;
font-size:16px;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ffd700;
color:#000;
font-weight:bold;
font-size:18px;
cursor:pointer;
}
.small{
margin-top:15px;
font-size:13px;
color:#888;
}
</style>
</head>
<body>

<div class="box">

<h1>🔥 Unlock Premium</h1>
<p class="price">₹89 Lifetime</p>

<div class="qr">
<p>📷 Add Your QR Image Here</p>
</div>

<div class="upi">
UPI ID: yourupi@okaxis
</div>

<button onclick="window.location.href='ai-dashboard.html'">
✅ I Paid - Continue
</button>

<p class="small">After payment click continue.</p>

</div>

</body>
</html>
